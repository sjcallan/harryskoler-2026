<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry Skoler — Signature Animation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    color: #e8e0d8;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  .stage {
    width: min(85vw, 720px);
    position: relative;
  }

  .signature-wrap {
    width: 100%;
    position: relative;
  }

  .sig-svg {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 0 30px rgba(255,255,255,0.04));
  }

  .mask-seg {
    fill: none;
    stroke: white;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .controls {
    margin-top: 3rem;
    display: flex;
    gap: 1.2rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.6em 1.8em;
    background: transparent;
    color: #e8e0d8;
    border: 1px solid rgba(255,255,255,0.25);
    cursor: pointer;
    transition: all 0.3s ease;
  }
  button:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.5);
  }

  label {
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    opacity: 0.6;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  input[type=range] {
    accent-color: #e8e0d8;
    width: 100px;
  }

  .speed-val {
    min-width: 2.5em;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .color-row {
    display: flex;
    gap: 0.5rem;
  }
  .color-swatch {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .color-swatch.active,
  .color-swatch:hover {
    border-color: #e8e0d8;
  }
</style>
</head>
<body>

<div class="stage" id="app">
  <div class="signature-wrap">
    <svg class="sig-svg" viewBox="0 0 880.1 352.1" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <defs>
        <mask id="sig-mask">
          <rect x="0" y="0" width="100%" height="100%" fill="black"/>
          <!--
            Guide paths trace the pen direction to progressively reveal the signature.
            CRITICAL: Paths MUST overlap generously at every junction (~30-50px)
            so the thick mask strokes cover all connecting ink with no gaps.
          -->
          <!-- 0: H downstroke — starts high, overlaps into crossbar zone -->
          <path class="mask-seg" id="ms0" stroke-width="130"
            d="M 92,48 C 78,95 55,145 30,200 L 20,210"/>
          <!-- 1: H crossbar — starts far left, overlaps past H downstroke -->
          <path class="mask-seg" id="ms1" stroke-width="130"
            d="M 0,178 C 20,176 40,174 60,172 C 80,170 100,168 120,166 C 140,164 160,162 175,160"/>
          <!-- 2: arry — overlaps with crossbar end, extends into y connection zone -->
          <path class="mask-seg" id="ms2" stroke-width="130"
            d="M 155,162 C 175,158 195,155 215,162 C 240,170 260,178 280,180 C 290,182 295,184 300,188"/>
          <!-- 3: second tall stroke — overlaps with crossbar -->
          <path class="mask-seg" id="ms3" stroke-width="100"
            d="M 172,55 C 178,85 183,115 188,145 C 192,165 196,178 200,195"/>
          <!-- 4: y descender — starts overlapping end of arry, curves down,
               sweeps back up to overlap start of S swoop. This is the key
               connecting segment between "Harry" and "Skoler". -->
          <path class="mask-seg" id="ms4" stroke-width="100"
            d="M 275,178 C 285,188 292,198 298,215 C 305,240 310,265 315,290 C 320,315 330,335 345,328 C 358,320 365,300 368,280 C 365,260 350,240 330,220 C 315,205 300,190 290,180"/>
          <!-- 5: S up swoop — starts overlapping y return area, sweeps up to loop top -->
          <path class="mask-seg" id="ms5" stroke-width="130"
            d="M 280,185 C 300,168 325,140 360,105 C 400,65 445,35 490,18 C 530,5 560,8 575,30 L 578,48"/>
          <!-- 6: S loop + down — overlaps top of S, comes back down to baseline -->
          <path class="mask-seg" id="ms6" stroke-width="130"
            d="M 572,30 C 575,60 568,85 548,108 C 525,135 500,158 478,178 L 465,190"/>
          <!-- 7: toler — overlaps with S bottom, flows right across signature -->
          <path class="mask-seg" id="ms7" stroke-width="130"
            d="M 455,185 C 485,178 520,175 560,180 C 600,185 640,190 685,195 C 730,200 770,203 820,208 L 840,210"/>
          <!-- 8: far right extensions — overlaps toler end -->
          <path class="mask-seg" id="ms8" stroke-width="130"
            d="M 820,205 C 840,208 855,212 868,218 C 876,224 880,235 880,248"/>
          <!-- 9: right descenders + flourish — overlaps toler midpoint -->
          <path class="mask-seg" id="ms9" stroke-width="120"
            d="M 680,192 C 695,200 700,218 698,240 C 694,260 685,278 675,292 C 665,305 658,312 650,318 C 642,322 648,318 660,308 C 678,290 700,265 725,242 C 750,220 775,205 800,198 L 815,195"/>
          <!-- 10: final marks — overlaps right end -->
          <path class="mask-seg" id="ms10" stroke-width="120"
            d="M 800,196 C 815,200 835,210 852,222 C 865,232 875,242 880,255"/>
        </mask>
      </defs>

        fill-rule="evenodd" ensures the counters punch through correctly.
        NEVER split this compound path into separate elements.

      <span class="speed-val" id="speed-val">3.0s</span>
    </label>
    <div class="color-row">
      <div class="color-swatch active" style="background:#fff" data-color="#ffffff"></div>
      <div class="color-swatch" style="background:#c9a96e" data-color="#c9a96e"></div>
      <div class="color-swatch" style="background:#4ea8de" data-color="#4ea8de"></div>

<script>
(function () {
  'use strict';

  const SEGMENT_WEIGHTS = [
    0.08, 0.08, 0.10, 0.06, 0.10,  // H down, H cross, arry, tall stroke, y descender
    0.12, 0.08, 0.14, 0.06, 0.10, 0.08,  // S up, S loop, toler, far right, right desc, final
  ];

  const EASING = 'cubic-bezier(0.65, 0, 0.35, 1)';

  let duration = 3;
  let currentColor = '#ffffff';
  let segments = [];

  function init() {
    for (let i = 0; i <= 10; i++) {
      const el = document.getElementById('ms' + i);
      if (!el) continue;
      const len = el.getTotalLength();
      el.style.strokeDasharray = len;
      el.style.strokeDashoffset = len;
      segments.push({ el, length: len });
    }

    document.getElementById('btn-play').addEventListener('click', play);

    const speedInput = document.getElementById('speed');
    const speedVal = document.getElementById('speed-val');
    speedInput.addEventListener('input', () => {
      duration = parseFloat(speedInput.value);
      speedVal.textContent = duration.toFixed(1) + 's';
    });

    document.querySelectorAll('.color-swatch').forEach(sw => {
      sw.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
        currentColor = sw.dataset.color;
        document.querySelectorAll('#sig-fill-group path').forEach(p => {
          p.setAttribute('fill', currentColor);
        });
      });
    });

    document.querySelectorAll('#sig-fill-group path').forEach(p => {
      p.setAttribute('fill', currentColor);
    });

    requestAnimationFrame(() => play());
  }

  function play() {
    segments.forEach(({ el, length }) => {
      el.style.transition = 'none';
      el.style.strokeDashoffset = length;
    });

    void document.querySelector('.sig-svg').getBoundingClientRect();

    requestAnimationFrame(() => {
      let cumulativeDelay = 0;
      segments.forEach(({ el, length }, i) => {
        const w = SEGMENT_WEIGHTS[i] || 0.05;
        const segDur = w * duration;
        el.style.transition =
          `stroke-dashoffset ${segDur}s ${EASING} ${cumulativeDelay}s`;
        el.style.strokeDashoffset = '0';
        cumulativeDelay += segDur;
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
